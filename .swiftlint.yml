disabled_rules:
  - trailing_whitespace

opt_in_rules:
  - force_unwrapping
  - force_cast
  - force_try
  - implicitly_unwrapped_optional
  - prohibited_interface_builder

analyzer_rules:
  - unused_declaration
  - unused_import

included:
  - Trace
  - TraceTests
  - TraceUITests

excluded:
  - .build
  - DerivedData
  - build
  - .swiftpm

line_length:
  warning: 120
  error: 160

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 800

function_body_length:
  warning: 60
  error: 100

cyclomatic_complexity:
  warning: 10
  error: 15

identifier_name:
  min_length:
    warning: 2
  excluded:
    - id
    - x
    - y

force_unwrapping:
  severity: error

force_cast:
  severity: error

force_try:
  severity: error

implicitly_unwrapped_optional:
  severity: error
